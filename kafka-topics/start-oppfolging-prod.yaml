apiVersion: kafka.nais.io/v1
kind: Topic
metadata:
  name: start-oppfolging
  namespace: poao
  labels:
    team: poao
  annotations:
    kafka.nais.io/removeDataWhenResourceIsDeleted: "true"
spec:
  pool: nav-prod
  config:
    cleanupPolicy: delete
    retentionHours: 336 # 2 uker
    minimumInSyncReplicas: 2
    partitions: 8
  acl:
    - team: pto
      application: pto-kafka-manager
      access: readwrite
    - team: poao
      application: veilarboppfolging
      access: read
    - team: teamsykefravr
      application: isoppfolgingstilfelle
      access: write
