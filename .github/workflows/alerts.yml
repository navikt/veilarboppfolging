name: Deploy alerts
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'alerts/kafka_failed_records_alert.yaml'
      - 'alerts/alerts.yaml'
      - '.github/workflows/alerts.yml'

concurrency:
  group: deploy_alerts
  cancel-in-progress: true

jobs:
  apply-alerts-dev:
    name: Apply alerts til dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: deploy alerts to dev
        uses: nais/deploy/actions/deploy@823ec9b7e305ce7cf911d0f9a25f7da9d7486cf2
        env:
          CLUSTER: dev-gcp
          RESOURCE: >-
            alerts/kafka_failed_records_alert.yaml,
            alerts/alerts.yaml

  apply-alerts-prod:
    name: Apply alerts til prod
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: deploy alerts to prod
        uses: nais/deploy/actions/deploy@823ec9b7e305ce7cf911d0f9a25f7da9d7486cf2
        env:
          CLUSTER: prod-gcp
          RESOURCE: >-
            alerts/kafka_failed_records_alert.yaml,
            alerts/alerts.yaml
