name: Deploy app
run-name: Deploy ${{github.ref_name}} to dev/prod
on:
  workflow_call:
    inputs:
      image:
        description: 'Image name to deploy'
        required: true
        type: string
      env:
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK:
        required: true

env:
  PRINT_PAYLOAD: true

jobs:
  deploy:
    name: Deploy to ${{inputs.env}}
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    steps:
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@823ec9b7e305ce7cf911d0f9a25f7da9d7486cf2
        env:
          CLUSTER: ${{ inputs.env }}-gcp
          RESOURCE: nais-${{ inputs.env }}-gcp.yaml
          VAR: image=${{ inputs.image }}
      - name: Slack Notification (deploy failure)
        if: failure()
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58
        env:
          SLACK_COLOR: danger
          SLACK_USERNAME: Github Actions
          SLACK_ICON: https://github.com/github.png?size=48
          SLACK_TITLE: 'Veilarbaktivitet: deploy til ${{inputs.env}} feilet'
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: 'Commit-message til feilende deploy: ${{ github.event.head_commit.message }}'
