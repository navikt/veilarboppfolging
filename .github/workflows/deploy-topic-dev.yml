name: Deploy oppfolgingshendelse topic to dev
on:
  push:
    branches:
      - main
    paths:
      - "kafka-topics/privat-oppfolgingshendelse-dev.yaml"
      - "kafka-topics/siste-oppfolgingsperiode-v2-dev.yaml"
      - "kafka-topics/siste-oppfolgingsperiode-v3-dev.yaml"
      - "kafka-topics/start-oppfolging-dev.yaml"
  workflow_dispatch:

jobs:
  deploy-topics-dev:
    name: Deploy oppfolgingshendelse topic to dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Deploy kafka topics
        uses: nais/deploy/actions/deploy@823ec9b7e305ce7cf911d0f9a25f7da9d7486cf2
        env:
          CLUSTER: dev-gcp
          RESOURCE: kafka-topics/privat-oppfolgingshendelse-dev.yaml
          PRINT_PAYLOAD: true
      - name: Deploy kafka topic siste-oppfolgingsperiode-v2-dev
        uses: nais/deploy/actions/deploy@823ec9b7e305ce7cf911d0f9a25f7da9d7486cf2
        env:
          CLUSTER: dev-gcp
          RESOURCE: kafka-topics/siste-oppfolgingsperiode-v2-dev.yaml
          PRINT_PAYLOAD: true
      - name: Deploy kafka topic siste-oppfolgingsperiode-v3-dev
        uses: nais/deploy/actions/deploy@823ec9b7e305ce7cf911d0f9a25f7da9d7486cf2
        env:
          CLUSTER: dev-gcp
          RESOURCE: kafka-topics/siste-oppfolgingsperiode-v3-dev.yaml
          PRINT_PAYLOAD: true
      - name: Deploy kafka topic start-oppfolging-dev
        uses: nais/deploy/actions/deploy@823ec9b7e305ce7cf911d0f9a25f7da9d7486cf2
        env:
          CLUSTER: dev-gcp
          RESOURCE: kafka-topics/start-oppfolging-dev.yaml
          PRINT_PAYLOAD: true